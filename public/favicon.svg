<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo negro (igual que el logo) -->
  <rect width="32" height="32" rx="6" fill="#000000"/>

  <!-- Puntos halftone rojo arriba-izquierda -->
  <circle cx="4"  cy="4"  r="1.4" fill="#CC0000" opacity="0.9"/>
  <circle cx="8"  cy="4"  r="1.1" fill="#CC0000" opacity="0.6"/>
  <circle cx="4"  cy="8"  r="1.1" fill="#CC0000" opacity="0.6"/>

  <!-- Puntos halftone verde arriba-derecha -->
  <circle cx="28" cy="4"  r="1.4" fill="#00C040" opacity="0.9"/>
  <circle cx="24" cy="4"  r="1.1" fill="#00C040" opacity="0.6"/>
  <circle cx="28" cy="8"  r="1.1" fill="#00C040" opacity="0.6"/>

  <!-- "L" estilizada (script, igual al logo) en blanco -->
  <text
    x="16" y="23"
    font-family="Georgia, serif"
    font-style="italic"
    font-weight="bold"
    font-size="20"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >L</text>

  <!-- Línea verde inferior (detalle del logo) -->
  <rect x="6" y="28" width="20" height="1.5" rx="0.75" fill="#00C040" opacity="0.7"/>
</svg>
